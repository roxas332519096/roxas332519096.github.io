ld2&gt;</span><br><span class="line">&lt;/div&gt;</span><br><span class="line"></span><br><span class="line">&lt;script&gt;</span><br><span class="line">    Vue.component(<span class="string">'comp-child'</span>,&#123;</span><br><span class="line">        props:[<span class="string">'level'</span>],</span><br><span class="line">        template:`</span><br><span class="line">        &lt;div&gt;</span><br><span class="line">            &lt;h1 v-if=<span class="string">"level===1"</span>&gt;</span><br><span class="line">                &lt;slot&gt;&lt;/slot&gt;</span><br><span class="line">            &lt;/h1&gt;</span><br><span class="line">            &lt;h2 v-if=<span class="string">"level===2"</span>&gt;</span><br><span class="line">                &lt;slot&gt;&lt;/slot&gt;</span><br><span class="line">            &lt;/h2&gt;</span><br><span class="line">            &lt;h3 v-if=<span class="string">"level===3"</span>&gt;</span><br><span class="line">                &lt;slot&gt;&lt;/slot&gt;</span><br><span class="line">            &lt;/h3&gt;</span><br><span class="line">        &lt;/div&gt;</span><br><span class="line">        `</span><br><span class="line">    &#125;)</span><br><span class="line"></span><br><span class="line">    Vue.component(<span class="string">'comp-child2'</span>,&#123;</span><br><span class="line">        props:[<span class="string">'level'</span>],</span><br><span class="line">        render:<span class="keyword">function</span>(createElement)&#123;</span><br><span class="line">            <span class="built_in">return</span> createElement(<span class="string">'h'</span>+this.level,this.<span class="variable">$slots</span>.default);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;)</span><br><span class="line"></span><br><span class="line">    var app = new Vue(&#123;</span><br><span class="line">        el:<span class="string">'#app'</span>,</span><br><span class="line">        data:&#123;</span><br><sp
